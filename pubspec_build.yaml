name: system_loja
description: Sistema de gerenciamento de loja com Flutter (build only)
version: 1.0.0
publish_to: "none"

environment:
  sdk: ">=3.10.3"

dependencies:
  # Only dependencies needed for code generation
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8
  path_provider: ^2.1.5
  synchronized: ^3.4.0
  path: ^1.9.1
  json_annotation: ^4.9.0
  async: ^2.13.0
  meta: ^1.17.0
  crypto: ^3.0.7
  freezed_annotation: ^3.1.0
  freezed: ^3.2.4
  intl: ^0.20.2
  drift: ^2.30.1
  sqlite3: ^2.9.4

dev_dependencies:
  build_runner: ^2.10.5
  json_serializable: ^6.11.4
  drift_dev: ^2.30.1
