name: system_loja
description: Sistema de gerenciamento de loja com Flutter
version: 0.0.1
publish_to: "none"

environment:
  sdk: ">=3.11.0"

dependencies:
  log_custom_printer:
    git:
      url: https://github.com/saulogatti/log_custom_printer
      ref: main

  flutter:
    sdk: flutter

  path_provider: ^2.1.5
  synchronized: ^3.4.0
  path: ^1.9.1
  json_annotation: ^4.11.0

  async: ^2.13.1
  meta: ^1.17.0
  crypto: ^3.0.7
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  freezed_annotation: ^3.1.0
  freezed: ^3.2.5
  bloc_lint: ^0.4.0
  plugin_platform_interface: ^2.1.8
  path_provider_platform_interface: ^2.1.2

  auto_route: ^11.1.0
  intl: ^0.20.2
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  file_selector: ^1.1.0
  sqlite3: ^3.2.0
  get_it: ^9.2.1

dev_dependencies:
  
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  json_serializable: ^6.13.1
  drift_dev: ^2.32.1
  auto_route_generator: ^10.5.0
  mockito: ^5.6.4
flutter:
  uses-material-design: true
